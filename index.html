<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Noobserver Status</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <header class="header">
    <div class="logo">
      <img id="server-icon">
      <div>
        <h1>Noobserver</h1>
        <p>Minecraft Survival Server</p>
      </div>
    </div>

    <div>
      <div id="status" class="status offline">OFFLINE</div>
      <div id="version" class="version">-</div>
    </div>
  </header>

  <section class="stats">

    <div class="card">
      <div class="label">Jugadores</div>
      <div class="value" id="players-count">0 / 20</div>
      <div class="bar"><div id="players-bar"></div></div>
    </div>

    <div class="card">

      <div class="label">Ping</div>
      <div class="value" id="ping-value">-- ms</div>

      <!-- PING BAR -->
      <div class="ping-wrapper">

        <div class="ping-bar">

          <div class="seg seg-excellent"></div>
          <div class="seg seg-good"></div>
          <div class="seg seg-ok"></div>
          <div class="seg seg-bad"></div>
          <div class="seg seg-poor"></div>
          <div class="seg seg-dead"></div>

          <div id="ping-indicator" class="ping-indicator"></div>

        </div>

        <div id="ping-state" class="ping-state">Sin datos</div>

      </div>

      <canvas id="ping-chart"></canvas>

    </div>

  </section>

  <section class="card">
    <div class="label">MOTD</div>
    <div id="motd"></div>
  </section>

  <section class="card">
    <div class="label">Jugadores</div>
    <div id="players-list"></div>
  </section>

  <footer>
    Última actualización: <span id="last-update">--</span>
  </footer>

</div>

<script src="config.js"></script>
<script src="script.js"></script>

</body>
</html>
