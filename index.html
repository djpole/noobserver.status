<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Noobserver Status</title>

  <link rel="icon" type="image/png" href="assets/favicon.png"/>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="container">

<header>
  <img id="server-icon">
  <h1>Noobserver</h1>
  <div id="status" class="status offline">OFFLINE</div>
  <div id="version"></div>
</header>

<section>
  <div id="players-count"></div>
  <div id="players-bar"></div>
  <div id="players-list"></div>
</section>

<section>
  <div id="ping-value"></div>

  <div class="ping-bar">
    <div id="ping-arrow">▼</div>
  </div>

  <canvas id="ping-chart"></canvas>
</section>

<section id="motd"></section>

<footer>
  Última actualización: <span id="last-update">--</span>
</footer>

</div>

<script src="config.js"></script>
<script src="script.js"></script>

</body>
</html>
