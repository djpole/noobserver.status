<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Noobserver Status</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- HEADER -->
    <header class="header">
      <div class="logo">
        <img id="server-icon" src="" alt="server icon">
        <div>
          <h1>Noobserver</h1>
          <p>Minecraft Survival Server</p>
        </div>
      </div>
      <div class="top-status">
        <div id="status" class="status offline">OFFLINE</div>
        <div id="version" class="version">-</div>
      </div>
    </header>

    <!-- QUICK STATS -->
    <section class="stats">
      <div class="card">
        <div class="label">Jugadores</div>
        <div class="value" id="players-count">0 / 20</div>
        <div class="bar">
          <div id="players-bar"></div>
        </div>
      </div>

      <div class="card">
        <div class="label">Ping</div>
        <div class="value" id="ping-value">-- ms</div>
        
        <!-- NUEVA BARRA DE ESTADO -->
        <div class="ping-status-container">
          <div class="ping-bar">
            <div class="ping-bar-segment good"></div>
            <div class="ping-bar-segment acceptable"></div>
            <div class="ping-bar-segment bad"></div>
            <div class="ping-bar-segment terrible"></div>
          </div>
          <div id="ping-arrow" class="ping-arrow">▼</div>
        </div>

        <div id="ping-status-text" class="ping-status-text">Estado del servidor: -</div>
      </div>
    </section>

    <!-- MOTD -->
    <section class="card motd">
      <div class="label">Mensaje del servidor</div>
      <div id="motd"></div>
    </section>

    <!-- PLAYERS -->
    <section class="card players">
      <div class="label">Jugadores conectados</div>
      <div id="players-list" class="players-list">
        <div class="empty">Sin jugadores conectados</div>
      </div>
    </section>

    <!-- FOOTER -->
    <footer>
      <div>Última actualización: <span id="last-update">--</span></div>
    </footer>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
